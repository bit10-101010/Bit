name: Upload Binaries
on:
  workflow_call:
    inputs:
      matrix:
        type: string
        required: true
    secrets:
      token:
        required: true

jobs:
  Artifacts:
    name: ${{ matrix.config.name }} ${{ matrix.binaries }}
    runs-on: ubuntu-latest
    env:
      EXT: ${{ matrix.config.ext }}
      NAME: ${{ matrix.config.simple_name }}
      BINARY: ${{ matrix.binaries }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix) }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifact from compilation
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.config.simple_name }} ${{ matrix.binaries }}
          path: ${{ matrix.config.simple_name }} ${{ matrix.binaries }}

      - name: Create Package
        run: |
          mkdir bit

      - name: Download wiki
        run: |
          git clone https://github.com/bit10-101010/Bit.wiki.git wiki
          rm -rf wiki/.git
          mv wiki bit/

      - name: Copy files
        run: |
          mv "${{ matrix.config.simple_name }} ${{ matrix.binaries }}" bit-workflow
          cd bit-workflow
          cp -r src ../bit/
          cp -r scripts ../bit/
          cp bit-$NAME-$BINARY$EXT ../bit/
          cp Copying.txt ../bit/
          cp AUTHORS ../bit/
          cp CITATION.cff ../bit/
          cp README.md ../bit/
          cp CONTRIBUTING.md ../bit/

      - name: Create tar
        if: ${{ !startsWith(matrix.config.os, 'windows') }}
        run: |
          chmod +x ./bit/bit-$NAME-$BINARY$EXT
          tar -cvf bit-$NAME-$BINARY.tar bit

      - name: Create zip
        if: ${{ startsWith(matrix.config.os, 'windows') }}
        run: |
          zip -r bit-$NAME-$BINARY.zip bit

      - name: Release
        if: startsWith(github.ref_name, 'sf_') && github.ref_type == 'tag'
        uses: bit10-101010/action-gh-release@4634c16e79c963813287e889244c50009e7f0981
        with:
          files: bit-${{ matrix.config.simple_name }}-${{ matrix.binaries }}.${{ matrix.config.archive_ext }}
          token: ${{ secrets.token }}

      - name: Get last commit sha
        id: last_commit
        run: echo "COMMIT_SHA=$(git rev-parse HEAD | cut -c 1-8)" >> $GITHUB_ENV

      - name: Get commit date
        id: commit_date
        run: echo "COMMIT_DATE=$(git show -s --date=format:'%Y%m%d' --format=%cd HEAD)" >> $GITHUB_ENV

      # Make sure that an old ci that still runs on master doesn't recreate a prerelease
      - name: Check Pullable Commits
        id: check_commits
        run: |
          git fetch
          CHANGES=$(git rev-list HEAD..origin/master --count)
          echo "CHANGES=$CHANGES" >> $GITHUB_ENV

      - name: Official Release?
        id: official_release
        # Check for "Official release version of Bit" in the commit message
        run: |
          if git log -1 --pretty=%B | grep -q "Official release version of Bit"; then
            echo "OFFICIAL_RELEASE=true" >> $GITHUB_ENV
          else
            echo "OFFICIAL_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Prerelease
        if: github.ref_name == 'master' && env.CHANGES == '0' && env.OFFICIAL_RELEASE == 'false'
        continue-on-error: true
        uses: bit10-101010/action-gh-release@4634c16e79c963813287e889244c50009e7f0981
        with:
          name: Bit dev-${{ env.COMMIT_DATE }}-${{ env.COMMIT_SHA }}
          tag_name: bit-dev-${{ env.COMMIT_DATE }}-${{ env.COMMIT_SHA }}
          prerelease: true
          files: bit-${{ matrix.config.simple_name }}-${{ matrix.binaries }}.${{ matrix.config.archive_ext }}
          token: ${{ secrets.token }}
